<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Water bottle body -->
  <rect x="155" y="60" width="90" height="190" rx="12" fill="#0a0a0a"/>
  <rect x="160" y="65" width="80" height="180" rx="10" fill="#111"/>
  <!-- Gradient liquid -->
  <rect x="163" y="120" width="74" height="120" rx="8" fill="#0066cc" opacity="0.3"/>
  <!-- Stainless steel shine -->
  <rect x="165" y="70" width="10" height="170" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- Measurement lines -->
  <line x1="163" y1="140" x2="173" y2="140" stroke="#333" stroke-width="0.5"/>
  <line x1="163" y1="160" x2="178" y2="160" stroke="#333" stroke-width="0.5"/>
  <line x1="163" y1="180" x2="173" y2="180" stroke="#333" stroke-width="0.5"/>
  <line x1="163" y1="200" x2="178" y2="200" stroke="#333" stroke-width="0.5"/>
  <!-- Logo -->
  <text x="200" y="108" fill="#00e60a" font-size="10" font-weight="bold" font-family="sans-serif" text-anchor="middle">KYNOTRA</text>
  <!-- Lid -->
  <rect x="170" y="48" width="60" height="18" rx="6" fill="#222"/>
  <!-- Carry loop -->
  <path d="M185 48 Q185 32 200 30 Q215 32 215 48" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Temp indicator -->
  <circle cx="200" cy="170" r="12" fill="none" stroke="#0066cc" stroke-width="1" opacity="0.5"/>
  <text x="200" y="174" fill="#0066cc" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.6">❄</text>
  <!-- Insulation label -->
  <text x="200" y="265" fill="#555" font-size="9" font-family="sans-serif" text-anchor="middle">24HR COLD • 12HR HOT</text>
</svg>
