  <line x1="150" y1="108" x2="130" y2="196" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="105" x2="185" y2="197" stroke="#333" stroke-width="0.5" opacity="0.5"/>
