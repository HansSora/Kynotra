<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Bag body -->
  <rect x="100" y="100" width="200" height="130" rx="12" fill="#222"/>
  <rect x="105" y="105" width="190" height="120" rx="10" fill="#2a2a2a"/>
  <!-- Front pocket -->
  <rect x="130" y="140" width="100" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Zipper -->
  <line x1="130" y1="140" x2="230" y2="140" stroke="#555" stroke-width="2"/>
  <circle cx="180" cy="140" r="4" fill="#666"/>
  <!-- Handle straps -->
  <path d="M150 100 Q150 60 200 55 Q250 60 250 100" fill="none" stroke="#444" stroke-width="6" stroke-linecap="round"/>
  <path d="M150 100 Q150 65 200 60 Q250 65 250 100" fill="none" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <!-- Logo -->
  <text x="180" y="178" fill="#00e60a" font-size="12" font-weight="bold" font-family="sans-serif" text-anchor="middle">KYNOTRA</text>
  <!-- Side strap -->
  <rect x="300" y="130" width="30" height="8" rx="4" fill="#444"/>
  <rect x="300" y="160" width="30" height="8" rx="4" fill="#444"/>
  <!-- Shoe compartment indicator -->
  <rect x="105" y="195" width="60" height="25" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <text x="135" y="212" fill="#555" font-size="7" font-family="sans-serif" text-anchor="middle">SHOES</text>
</svg>
