<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Bottle body -->
  <rect x="155" y="80" width="90" height="170" rx="10" fill="#111"/>
  <rect x="160" y="85" width="80" height="160" rx="8" fill="#1a1a1a"/>
  <!-- Liquid -->
  <rect x="162" y="140" width="76" height="100" rx="6" fill="#00e60a" opacity="0.25"/>
  <!-- Measurement lines -->
  <line x1="162" y1="160" x2="175" y2="160" stroke="#333" stroke-width="1"/>
  <line x1="162" y1="180" x2="175" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="162" y1="200" x2="175" y2="200" stroke="#333" stroke-width="1"/>
  <text x="178" y="163" fill="#555" font-size="6" font-family="sans-serif">20oz</text>
  <text x="178" y="183" fill="#555" font-size="6" font-family="sans-serif">14oz</text>
  <!-- Logo -->
  <text x="200" y="128" fill="#00e60a" font-size="10" font-weight="bold" font-family="sans-serif" text-anchor="middle">K</text>
  <!-- Lid / spout -->
  <rect x="170" y="65" width="60" height="20" rx="6" fill="#333"/>
  <rect x="185" y="55" width="30" height="15" rx="4" fill="#444"/>
  <!-- Flip top -->
  <rect x="190" y="48" width="20" height="10" rx="5" fill="#555"/>
  <!-- Mixing ball icon -->
  <circle cx="200" cy="190" r="10" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="3,2"/>
</svg>
