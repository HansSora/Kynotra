<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Container -->
  <rect x="145" y="50" width="110" height="180" rx="10" fill="#1a1a3e"/>
  <rect x="150" y="55" width="100" height="170" rx="8" fill="#222244"/>
  <!-- Label -->
  <rect x="158" y="80" width="84" height="90" rx="4" fill="#0a0a2a"/>
  <text x="200" y="102" fill="#00e60a" font-size="10" font-weight="bold" font-family="sans-serif" text-anchor="middle">KYNOTRA</text>
  <text x="200" y="120" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">CREATINE</text>
  <text x="200" y="136" fill="#aaa" font-size="8" font-family="sans-serif" text-anchor="middle">MONOHYDRATE</text>
