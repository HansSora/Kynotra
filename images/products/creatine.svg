  <circle cx="215" cy="208" r="2" fill="#eee" opacity="0.25"/>
  <!-- Molecule icon -->
  <circle cx="310" cy="100" r="12" fill="none" stroke="#00e60a" stroke-width="1.5" opacity="0.4"/>
  <circle cx="330" cy="85" r="8" fill="none" stroke="#00e60a" stroke-width="1.5" opacity="0.4"/>
  <line x1="318" y1="92" x2="324" y2="89" stroke="#00e60a" stroke-width="1.5" opacity="0.4"/>
