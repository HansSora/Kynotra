  <line x1="110" y1="206" x2="120" y2="206" stroke="#444" stroke-width="2"/>
  <line x1="130" y1="206" x2="140" y2="206" stroke="#444" stroke-width="2"/>
  <line x1="150" y1="206" x2="160" y2="206" stroke="#444" stroke-width="2"/>
  <line x1="170" y1="206" x2="180" y2="206" stroke="#444" stroke-width="2"/>
