<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Rope handles -->
  <rect x="80" y="90" width="20" height="70" rx="4" fill="#444"/>
  <rect x="83" y="95" width="14" height="60" rx="3" fill="#555"/>
  <rect x="300" y="90" width="20" height="70" rx="4" fill="#444"/>
  <rect x="303" y="95" width="14" height="60" rx="3" fill="#555"/>
  <!-- Grip texture -->
  <line x1="83" y1="105" x2="97" y2="105" stroke="#666" stroke-width="1"/>
  <line x1="83" y1="115" x2="97" y2="115" stroke="#666" stroke-width="1"/>
  <line x1="83" y1="125" x2="97" y2="125" stroke="#666" stroke-width="1"/>
  <line x1="303" y1="105" x2="317" y2="105" stroke="#666" stroke-width="1"/>
  <line x1="303" y1="115" x2="317" y2="115" stroke="#666" stroke-width="1"/>
  <line x1="303" y1="125" x2="317" y2="125" stroke="#666" stroke-width="1"/>
  <!-- Cable -->
  <path d="M90 90 Q90 40 200 35 Q310 40 310 90" fill="none" stroke="#00e60a" stroke-width="3"/>
  <!-- Cable drooping section -->
  <path d="M90 160 Q120 230 200 240 Q280 230 310 160" fill="none" stroke="#00e60a" stroke-width="3"/>
  <!-- Ball bearings -->
  <circle cx="90" cy="88" r="5" fill="#888"/>
  <circle cx="310" cy="88" r="5" fill="#888"/>
  <!-- Counter display -->
  <rect x="83" y="130" width="14" height="12" rx="2" fill="#111"/>
  <text x="90" y="139" fill="#00e60a" font-size="6" font-family="sans-serif" text-anchor="middle">000</text>
</svg>
