<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Back rest -->
  <rect x="140" y="60" width="60" height="140" rx="6" fill="#333" transform="rotate(-15 170 130)"/>
  <rect x="145" y="65" width="50" height="130" rx="4" fill="#222" transform="rotate(-15 170 130)"/>
  <!-- Seat -->
  <rect x="160" y="190" width="120" height="30" rx="6" fill="#333"/>
  <rect x="165" y="192" width="110" height="26" rx="4" fill="#222"/>
  <!-- Frame legs -->
  <rect x="130" y="220" width="8" height="60" rx="2" fill="#555"/>
  <rect x="262" y="220" width="8" height="60" rx="2" fill="#555"/>
  <rect x="180" y="220" width="8" height="50" rx="2" fill="#555" transform="rotate(15 184 245)"/>
  <!-- Feet -->
  <rect x="120" y="275" width="30" height="6" rx="3" fill="#444"/>
  <rect x="250" y="275" width="30" height="6" rx="3" fill="#444"/>
  <!-- Adjustment holes -->
  <circle cx="168" cy="90" r="3" fill="#555" transform="rotate(-15 170 130)"/>
  <circle cx="168" cy="110" r="3" fill="#555" transform="rotate(-15 170 130)"/>
  <circle cx="168" cy="130" r="3" fill="#555" transform="rotate(-15 170 130)"/>
  <circle cx="168" cy="150" r="3" fill="#00e60a" transform="rotate(-15 170 130)"/>
  <circle cx="168" cy="170" r="3" fill="#555" transform="rotate(-15 170 130)"/>
</svg>
