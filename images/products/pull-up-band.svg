<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Band body -->
  <ellipse cx="200" cy="150" rx="120" ry="80" fill="none" stroke="#e63946" stroke-width="20"/>
  <ellipse cx="200" cy="150" rx="120" ry="80" fill="none" stroke="#c0303f" stroke-width="16"/>
  <!-- Inner texture -->
  <ellipse cx="200" cy="150" rx="105" ry="66" fill="none" stroke="#e63946" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
  <!-- Resistance label -->
  <rect x="155" y="135" width="90" height="30" rx="6" fill="#1a1a2e"/>
  <text x="200" y="155" fill="#e63946" font-size="12" font-weight="bold" font-family="sans-serif" text-anchor="middle">HEAVY</text>
  <!-- Weight -->
  <text x="200" y="260" fill="#666" font-size="10" font-family="sans-serif" text-anchor="middle">40-80 LBS RESISTANCE</text>
  <!-- Stretch marks -->
  <path d="M85 120 Q75 110 80 100" stroke="#e63946" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M315 120 Q325 110 320 100" stroke="#e63946" stroke-width="2" fill="none" opacity="0.3"/>
</svg>
