<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Shorts shape -->
  <path d="M120 80 L280 80 L280 100 Q280 110 270 110 L260 200 Q255 210 245 210 L210 210 L200 150 L190 210 L155 210 Q145 210 140 200 L130 110 Q120 110 120 100Z" fill="#222"/>
  <!-- Waistband -->
  <rect x="120" y="75" width="160" height="20" rx="4" fill="#333"/>
  <!-- Drawstring -->
  <path d="M190 82 L195 95 M210 82 L205 95" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Logo -->
  <text x="160" y="140" fill="#00e60a" font-size="10" font-weight="bold" font-family="sans-serif" transform="rotate(-5 160 140)">K</text>
  <!-- Seam line -->
  <line x1="200" y1="100" x2="200" y2="150" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Zipper pocket -->
  <rect x="240" y="110" width="20" height="2" rx="1" fill="#444"/>
  <circle cx="260" cy="111" r="2" fill="#555"/>
</svg>
