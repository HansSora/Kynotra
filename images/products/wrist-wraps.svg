<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <!-- Left wrap -->
  <path d="M80 80 L170 80 Q180 80 180 90 L180 220 Q180 230 170 230 L80 230 Q70 230 70 220 L70 90 Q70 80 80 80Z" fill="#111"/>
  <rect x="75" y="85" width="100" height="140" rx="4" fill="#1a1a1a"/>
  <!-- Wrap pattern -->
  <line x1="85" y1="95" x2="165" y2="95" stroke="#333" stroke-width="2"/>
  <line x1="85" y1="110" x2="165" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="85" y1="125" x2="165" y2="125" stroke="#333" stroke-width="2"/>
  <line x1="85" y1="140" x2="165" y2="140" stroke="#333" stroke-width="2"/>
  <!-- Right wrap -->
  <path d="M220 80 L310 80 Q320 80 320 90 L320 220 Q320 230 310 230 L220 230 Q210 230 210 220 L210 90 Q210 80 220 80Z" fill="#111"/>
  <rect x="215" y="85" width="100" height="140" rx="4" fill="#1a1a1a"/>
  <line x1="225" y1="95" x2="305" y2="95" stroke="#333" stroke-width="2"/>
  <line x1="225" y1="110" x2="305" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="225" y1="125" x2="305" y2="125" stroke="#333" stroke-width="2"/>
  <line x1="225" y1="140" x2="305" y2="140" stroke="#333" stroke-width="2"/>
  <!-- Thumb loops -->
  <circle cx="125" cy="230" r="12" fill="none" stroke="#00e60a" stroke-width="3"/>
  <circle cx="265" cy="230" r="12" fill="none" stroke="#00e60a" stroke-width="3"/>
  <!-- Velcro tabs -->
  <rect x="85" y="175" width="80" height="20" rx="3" fill="#222" stroke="#333" stroke-width="1"/>
  <rect x="225" y="175" width="80" height="20" rx="3" fill="#222" stroke="#333" stroke-width="1"/>
</svg>
